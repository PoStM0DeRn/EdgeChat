<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TunnelChat Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --background: oklch(0.145 0 0);
      --foreground: oklch(0.985 0 0);
      --card: oklch(0.205 0 0);
      --card-foreground: oklch(0.985 0 0);
      --primary: oklch(0.922 0 0);
      --primary-foreground: oklch(0.205 0 0);
      --secondary: oklch(0.269 0 0);
      --secondary-foreground: oklch(0.985 0 0);
      --muted: oklch(0.269 0 0);
      --muted-foreground: oklch(0.708 0 0);
      --accent: oklch(0.269 0 0);
      --accent-foreground: oklch(0.985 0 0);
      --destructive: oklch(0.704 0.191 22.216);
      --border: oklch(1 0 0 / 10%);
      --input: oklch(1 0 0 / 15%);
      --ring: oklch(0.556 0 0);
      --success: oklch(0.696 0.17 162.48);
      --radius: 0.625rem;
    }

    body {
      font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--background);
      color: var(--foreground);
      border-radius: 12px;
      overflow: hidden;
      height: 100vh;
      border: 1px solid var(--border);
      -webkit-app-region: drag;
      user-select: none;
      font-feature-settings: 'ss01', 'ss02', 'cv01';
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }

    .header__title {
      font-size: 13px;
      font-weight: 600;
      color: var(--foreground);
      letter-spacing: -0.01em;
    }

    .header__close {
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      color: var(--muted-foreground);
      font-size: 16px;
      cursor: pointer;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: calc(var(--radius) - 4px);
      transition: background 0.15s, color 0.15s;
    }

    .header__close:hover {
      background: var(--accent);
      color: var(--accent-foreground);
    }

    /* ── Content ── */
    .content {
      padding: 16px;
      -webkit-app-region: no-drag;
      overflow-y: auto;
      max-height: calc(100vh - 49px);
    }

    .content::-webkit-scrollbar {
      width: 6px;
    }

    .content::-webkit-scrollbar-track {
      background: transparent;
    }

    .content::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    /* ── Status Card ── */
    .status-card {
      padding: 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--card);
      text-align: center;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }

    .status-card[data-state="online"] {
      border-color: oklch(0.696 0.17 162.48 / 30%);
    }

    .status-card[data-state="offline"] {
      border-color: oklch(0.704 0.191 22.216 / 20%);
    }

    .status-card[data-state="error"] {
      border-color: oklch(0.704 0.191 22.216 / 30%);
    }

    .status-card[data-state="connecting"] {
      border-color: oklch(0.769 0.188 70.08 / 30%);
    }

    .status__icon {
      font-size: 28px;
      margin-bottom: 8px;
      line-height: 1;
    }

    .status__text {
      font-size: 14px;
      font-weight: 600;
      color: var(--foreground);
      margin-bottom: 2px;
    }

    .status__detail {
      font-size: 12px;
      color: var(--muted-foreground);
    }

    /* ── LM Studio Badge ── */
    .lm-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 500;
      margin-top: 10px;
      border: 1px solid transparent;
      transition: all 0.2s;
    }

    .lm-badge[data-status="ok"] {
      background: oklch(0.696 0.17 162.48 / 12%);
      color: var(--success);
      border-color: oklch(0.696 0.17 162.48 / 20%);
    }

    .lm-badge[data-status="err"] {
      background: oklch(0.704 0.191 22.216 / 12%);
      color: var(--destructive);
      border-color: oklch(0.704 0.191 22.216 / 20%);
    }

    .lm-badge__dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .lm-badge[data-status="ok"] .lm-badge__dot {
      background: var(--success);
    }

    .lm-badge[data-status="err"] .lm-badge__dot {
      background: var(--destructive);
    }

    /* ── Form ── */
    .form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group__label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted-foreground);
      letter-spacing: 0.01em;
    }

    .form-group__input {
      height: 36px;
      width: 100%;
      padding: 0 12px;
      border-radius: calc(var(--radius) - 2px);
      border: 1px solid var(--input);
      background: transparent;
      color: var(--foreground);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .form-group__input::placeholder {
      color: var(--muted-foreground);
      opacity: 0.5;
    }

    .form-group__input:focus {
      border-color: var(--ring);
      box-shadow: 0 0 0 1px var(--ring);
    }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      height: 36px;
      border-radius: calc(var(--radius) - 2px);
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, opacity 0.15s, transform 0.1s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn--primary {
      background: var(--primary);
      color: var(--primary-foreground);
      box-shadow: 0 1px 2px oklch(0 0 0 / 20%);
    }

    .btn--primary:hover:not(:disabled) {
      background: oklch(0.922 0 0 / 0.9);
    }

    .btn--secondary {
      background: var(--secondary);
      color: var(--secondary-foreground);
      border: 1px solid var(--border);
      box-shadow: 0 1px 2px oklch(0 0 0 / 10%);
    }

    .btn--secondary:hover:not(:disabled) {
      background: oklch(0.269 0 0 / 0.8);
    }

    .btn--destructive {
      background: oklch(0.704 0.191 22.216 / 15%);
      color: var(--destructive);
      border: 1px solid oklch(0.704 0.191 22.216 / 25%);
    }

    .btn--destructive:hover:not(:disabled) {
      background: oklch(0.704 0.191 22.216 / 0.25);
    }

    .btn--ghost {
      background: transparent;
      color: var(--muted-foreground);
    }

    .btn--ghost:hover:not(:disabled) {
      background: var(--accent);
      color: var(--accent-foreground);
    }

    .btn--outline {
      background: transparent;
      color: var(--foreground);
      border: 1px solid var(--border);
    }

    .btn--outline:hover:not(:disabled) {
      background: var(--accent);
      color: var(--accent-foreground);
    }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Utilities ── */
    .hidden {
      display: none !important;
    }

    .mt-2 {
      margin-top: 8px;
    }

    .mt-3 {
      margin-top: 12px;
    }

    .gap-2 {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="header__title">TunnelChat Agent</span>
    <button class="header__close" onclick="window.electronAPI?.minimize()">&#xd7;</button>
  </div>

  <div class="content">
    <div id="status-card" class="status-card" data-state="offline">
      <div class="status__icon" id="status-icon">&#x1f534;</div>
      <div class="status__text" id="status-text">Отключён</div>
      <div class="status__detail" id="status-detail">Настройте подключение ниже</div>
      <div id="lm-badge" class="lm-badge" data-status="err">
        <span class="lm-badge__dot"></span>
        <span id="lm-badge-text">Проверяю LM Studio...</span>
      </div>
    </div>

    <div id="config-form" class="form">
      <div class="form-group">
        <label class="form-group__label" for="saas-url">URL сервера</label>
        <input class="form-group__input" type="url" id="saas-url" placeholder="https://your-saas.vercel.app">
      </div>
      <div class="form-group">
        <label class="form-group__label" for="agent-token">Токен Агента</label>
        <input class="form-group__input" type="password" id="agent-token" placeholder="Вставьте токен из SaaS">
      </div>
      <div class="form-group">
        <label class="form-group__label" for="agent-name">Имя Агента</label>
        <input class="form-group__input" type="text" id="agent-name" placeholder="My PC" value="My PC">
      </div>
      <div class="form-group">
        <label class="form-group__label" for="lmstudio-url">LM Studio URL</label>
        <input class="form-group__input" type="url" id="lmstudio-url" placeholder="http://localhost:1234" value="http://localhost:1234">
      </div>
      <div class="form-group">
        <label class="form-group__label" for="lmstudio-model">Модель LM Studio</label>
        <input class="form-group__input" type="text" id="lmstudio-model" placeholder="qwythos-9b-claude-mythos-5-1m">
      </div>
    </div>

    <div class="mt-3 gap-2">
      <button class="btn btn--secondary" id="btn-save" onclick="handleSave()">
        Сохранить
      </button>
      <button class="btn btn--primary" id="btn-connect" onclick="handleConnect()">
        Подключиться
      </button>
      <button class="btn btn--destructive hidden" id="btn-disconnect" onclick="handleDisconnect()">
        Отключиться
      </button>
    </div>
  </div>

  <script>
    let connected = false

    async function init() {
      const config = await window.agent.getConfig()
      if (config.saasUrl) document.getElementById('saas-url').value = config.saasUrl
      if (config.agentToken) document.getElementById('agent-token').value = config.agentToken
      if (config.agentName) document.getElementById('agent-name').value = config.agentName
      if (config.lmstudioUrl) document.getElementById('lmstudio-url').value = config.lmstudioUrl
      if (config.lmstudioModel) document.getElementById('lmstudio-model').value = config.lmstudioModel

      const status = await window.agent.getStatus()
      updateUI(status)

      const lmstudio = await window.agent.checkLMStudio()
      const badge = document.getElementById('lm-badge')
      const badgeText = document.getElementById('lm-badge-text')
      if (lmstudio.ok) {
        badge.setAttribute('data-status', 'ok')
        badgeText.textContent = lmstudio.models?.slice(0, 3).join(', ') || 'Подключён'
      } else {
        badge.setAttribute('data-status', 'err')
        badgeText.textContent = lmstudio.error || 'Не найден'
      }

      window.agent.onStatus((status) => updateUI(status))
    }

    function updateUI(status) {
      const card = document.getElementById('status-card')
      const icon = document.getElementById('status-icon')
      const text = document.getElementById('status-text')
      const detail = document.getElementById('status-detail')
      const btnConnect = document.getElementById('btn-connect')
      const btnDisconnect = document.getElementById('btn-disconnect')

      if (status.online) {
        card.setAttribute('data-state', 'online')
        icon.textContent = '\u{1F7E2}'
        text.textContent = 'Подключён'
        detail.textContent = status.name || 'Агент работает'
        btnConnect.classList.add('hidden')
        btnDisconnect.classList.remove('hidden')
        connected = true
      } else if (status.error) {
        card.setAttribute('data-state', 'error')
        icon.textContent = '\u{1F534}'
        text.textContent = 'Ошибка'
        detail.textContent = status.error
        btnConnect.classList.remove('hidden')
        btnConnect.disabled = false
        btnDisconnect.classList.add('hidden')
        connected = false
      } else {
        card.setAttribute('data-state', 'offline')
        icon.textContent = '\u{1F534}'
        text.textContent = 'Отключён'
        detail.textContent = 'Настройте подключение ниже'
        btnConnect.classList.remove('hidden')
        btnConnect.disabled = false
        btnDisconnect.classList.add('hidden')
        connected = false
      }
    }

    async function handleSave() {
      const saasUrl = document.getElementById('saas-url').value.trim()
      const agentToken = document.getElementById('agent-token').value.trim()
      const agentName = document.getElementById('agent-name').value.trim() || 'My PC'
      const lmstudioUrl = document.getElementById('lmstudio-url').value.trim() || 'http://localhost:1234'
      const lmstudioModel = document.getElementById('lmstudio-model').value.trim()

      await window.agent.saveConfig({ saasUrl, agentToken, agentName, lmstudioUrl, lmstudioModel })
      const btn = document.getElementById('btn-save')
      btn.textContent = '\u2713 Сохранено'
      setTimeout(() => { btn.textContent = 'Сохранить' }, 1500)
    }

    async function handleConnect() {
      const saasUrl = document.getElementById('saas-url').value.trim()
      const agentToken = document.getElementById('agent-token').value.trim()
      const agentName = document.getElementById('agent-name').value.trim() || 'My PC'
      const lmstudioUrl = document.getElementById('lmstudio-url').value.trim() || 'http://localhost:1234'
      const lmstudioModel = document.getElementById('lmstudio-model').value.trim()

      if (!saasUrl || !agentToken) {
        updateUI({ error: 'Заполните URL сервера и токен' })
        return
      }

      const btn = document.getElementById('btn-connect')
      btn.disabled = true
      btn.innerHTML = '<span class="spinner"></span>Подключение...'
      updateUI({ online: false })

      await window.agent.connect({ saasUrl, agentToken, agentName, lmstudioUrl, lmstudioModel })
    }

    async function handleDisconnect() {
      await window.agent.disconnect()
      updateUI({ online: false })
    }

    init()
  </script>
</body>
</html>
