services:
  app:
    build: .
    env_file:
      - .env
    ports:
      - "3001:81"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=file:/app/db/custom.db
      - WS_SERVER_URL=http://host.docker.internal:3002
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    volumes:
      - db-data:/app/db
      - uploads-data:/app/uploads
    depends_on:
      - ws-server
    restart: unless-stopped

  ws-server:
    image: node:20-slim
    working_dir: /ws
    command: sh -c "npm init -y && npm install socket.io && node ws-server.js"
    ports:
      - "3002:3002"
    volumes:
      - ./server:/ws:ro
    environment:
      - WS_PORT=3002
      - SAAS_URL=http://app:3000
    restart: unless-stopped

volumes:
  db-data:
  uploads-data:
