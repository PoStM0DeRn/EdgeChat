services:
  app:
    build: .
    env_file:
      - .env
    ports:
      - "127.0.0.1:3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=file:/app/db/custom.db
      - WS_SERVER_URL=http://ws-server:3002
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    volumes:
      - db-data:/app/db
      - uploads-data:/app/uploads
    depends_on:
      - ws-server
    restart: unless-stopped

  ws-server:
    build:
      context: .
      dockerfile: server/Dockerfile.ws
    ports:
      - "127.0.0.1:3002:3002"
    environment:
      - WS_PORT=3002
      - SAAS_URL=http://app:3000
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  db-data:
  uploads-data:
  caddy-data:
  caddy-config:
